name: "SRE-Incident-Response"
version: "1.0.0"
description: "A multi-task SRE incident-response environment where agents investigate alerts, inspect logs, patch broken services, validate fixes, and submit deterministic incident resolutions."
provider: "Hugging Face Spaces"
repository_url: "https://huggingface.co/spaces/Jha-ayush/rl-openenv"
interface: "HTTP"
port: 7860

action_space:
  type: "dict"
  description: "A dictionary with tool, command, file_path, and file_content"
  fields:
    tool:
      type: "string"
      enum: ["terminal", "editor", "replay", "submit"]
      description: "The tool to use."
    command:
      type: "string"
      description: "Shell command for terminal mode, or replay name for replay mode."
    file_path:
      type: "string"
      description: "Path of the file to edit (relative to workspace root)."
    file_content:
      type: "string"
      description: "New content of the file."

observation_space:
  stdout: "string"
  stderr: "string"
  exit_code: "int"
  file_tree: "list"
  alert_message: "string"

tasks:
  - id: "task1_wrong_status"
    name: "Task 1: FastAPI Status Code Mismatch"
    difficulty: "easy"
  - id: "task2_retry_logic"
    name: "Task 2: Off-by-One Retry Bug"
    difficulty: "medium"
  - id: "task3_cascading_failure"
    name: "Task 3: Cascading Timeout Failure"
    difficulty: "hard"
