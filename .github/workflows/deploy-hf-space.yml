name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hf-space-main
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            rl_env/pyproject.toml
            rl_env/uv.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./rl_env[dev]"

      - name: Run Pytest
        run: |
          python -m pytest tests/ -v

  deploy:
    name: Deploy to Hugging Face
    needs: test
    environment: prod
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            rl_env/pyproject.toml
            rl_env/uv.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./rl_env

      - name: Validate deployment settings
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO_ID: ${{ vars.HF_SPACE_REPO_ID }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Missing required GitHub Secret: HF_TOKEN"
            exit 1
          fi
          if [ -z "$HF_SPACE_REPO_ID" ]; then
            echo "Missing required GitHub Variable: HF_SPACE_REPO_ID (example: Jha-ayush/rl-openenv)"
            exit 1
          fi

      - name: Validate OpenEnv manifest
        working-directory: rl_env
        run: openenv validate .

      - name: Deploy to Hugging Face
        working-directory: rl_env
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO_ID: ${{ vars.HF_SPACE_REPO_ID }}
        run: openenv push . --repo-id "$HF_SPACE_REPO_ID"
